# teg-format.yaml
# General legacy reference format. Keep content reusable for frontend and backend execution guides.

document:
  title: Test Execution Guide
  font_name: Calibri
  font_size: 11
  output_prefix: TEG_
  blank_line_between_blocks: true

template:
  default_template: templates/Test-Execution-Guide-Template.docx

excel:
  header_scan_rows: 10
  header_aliases:
    tc_id:
      - Test Case #
      - Test Case#
      - Test Case No
      - Test Case Number
      - Test Case ID
      - TC ID
      - TCID
      - ID
      - Case ID
      - No

    title:
      - Title
      - Test Case Title
      - Test Title
      - Name
      - Scenario
      - Test Scenario

    steps:
      - Steps
      - Test Steps
      - Procedure
      - Actions
      - Action
      - Step

    expected:
      - Expected Result
      - Expected Results
      - Expected
      - Expected Behavior
      - Expected Output
      - Result

sections:
  guide_title_prefix: "Guide for "
  guide_title_separator: " - "

  devtools_checks:
    heading: "Execution checks"
    bullets:
      - "Preconditions and environment are ready."
      - "Logs/Console review completed (if applicable)."
      - "Network/API behavior review completed (if applicable)."

  evidence_to_capture:
    heading: "Evidence to capture"
    numbered:
      - "Before action state"
      - "After action state"
      - "Supporting technical proof (if applicable)"
    bullets:
      - "UI evidence (screen state), or"
      - "API/request evidence, or"
      - "System/log evidence"

  pass_fail_rule:
    heading: "Pass/Fail rule"
    pass_if_prefix: "Pass if: "
    fail_if_prefix: "Fail if: "
    blocked_if_prefix: "Blocked if: "
    fail_if_text: "Actual result does not match the expected result in the test case."
    blocked_if_text: "Required environment, access, data, or dependency is unavailable."

  notes:
    heading: "Notes (optional, 1 line)"
    bullet: ""
