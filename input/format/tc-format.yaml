# tc-format.yaml
# General content-only structure for Test Case YAML output.
# Formatting and workbook styling are maintained in input/customize/tc-customize.yaml.

output_file_name: "Test Case_<Feature Name>.xlsx"
sheet_name: "Sheet1"

test_cases:
  - title: "<Test case title>"
    description: "<1 short sentence describing the case objective>"
    precondition:
      - "<Precondition 1>"
    steps:
      - "<Step 1>"
      - "<Step 2>"
    expected_results:
      - "<Expected result 1>"
    actual_results: ""
    status: ""
    test_evidence: ""
