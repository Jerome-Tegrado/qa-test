# tp-format.yaml
# General reference format. Keep this file reusable and non-personalized.

tp_title: "<Feature or Component Name>"

intro: |
  <1-2 short sentences describing what is being tested and why it matters.>

scope:
  in_scope: |
    <1-2 short sentences describing what QA will validate.>
  out_scope: |
    <1 short sentence describing what is not covered.>

objectives:
  - "Verify that <key requirement 1> is met."
  - "Verify that <key requirement 2> is met."

approach_block: |
  Methodologies: <Manual, Automation, or Hybrid based on coverage needs.>
  Type of Testing: <Functional, Integration, Regression, and other relevant test types.>
  Tools Used: <Test management, browser/devtools, API client, automation tools as needed.>

schedule:
  - phase: "Planning"
    start: "<MM/DD or TBD>"
    end: "<MM/DD or TBD>"
  - phase: "Design"
    start: "<MM/DD or TBD>"
    end: "<MM/DD or TBD>"
  - phase: "Execution"
    start: "<MM/DD or TBD>"
    end: "<MM/DD or TBD>"
  - phase: "Retest and Closure"
    start: "<MM/DD or TBD>"
    end: "<MM/DD or TBD>"

environment_block: |
  Hardware/Software: <Target device, OS, browser/app version>
  Staging URL or App Version: <URL or version>
  Test Data Sources: <Optional; include only when needed>

resources:
  - role: "QA Lead"
    name: "<Name or Team>"
    responsibilities: "<Planning oversight, review, and sign-off.>"
  - role: "QA Engineer"
    name: "<Name or Team>"
    responsibilities: "<Test design, execution, evidence capture, and defect logging.>"
  - role: "Developer"
    name: "<Name or Team>"
    responsibilities: "<Defect fixes and support for verification.>"

risks:
  - risk: "<Risk description>"
    mitigation: "<Mitigation action>"

deliverables:
  - "Test Plan Document"
  - "Test Cases Document"
  - "Defect Report (if applicable)"

entry: |
  <1-2 short sentences describing when testing can start.>

exit: |
  <1-2 short sentences describing when testing can end.>
